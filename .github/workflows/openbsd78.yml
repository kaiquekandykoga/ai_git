name: OpenBSD 7_8

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    name: test
    steps:
      - uses: actions/checkout@v6

      - name: rake test
        uses: vmactions/openbsd-vm@v1
        with:
          release: "7.8"
          usesh: true
          mem: 4096
          prepare: |
            pkg_add ruby git
            gem install bundler

          run: |
            bundle install
            bundle exec rake test
